version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vasp-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vasp_agent
      POSTGRES_USER: vasp_user
      POSTGRES_PASSWORD: vasp_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

